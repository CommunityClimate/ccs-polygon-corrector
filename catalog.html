            // Find the field in filtered results
            const fieldIndex = filteredFields.findIndex(f => 
                f.ccsFieldId && f.ccsFieldId.toUpperCase().includes(fieldId)
            );
            
            if (fieldIndex >= 0) {
                // Calculate which page this field is on
                const pageNum = Math.floor(fieldIndex / currentItemsPerPage) + 1;
                currentPage = pageNum;
                renderCurrentView();
                
                // Scroll to the field card after a short delay
                setTimeout(() => {
                    const fieldCard = document.querySelector(`[onclick*="${filteredFields[fieldIndex].ccsFieldId}"]`);
                    if (fieldCard) {
                        const cardContainer = fieldCard.closest('.field-card');
                        cardContainer?.scrollIntoView({ 
                            behavior: 'smooth', 
                            block: 'center' 
                        });
                        cardContainer?.style.setProperty('box-shadow', '0 0 20px rgba(52, 152, 219, 0.8)', 'important');
                        setTimeout(() => {
                            cardContainer?.style.removeProperty('box-shadow');
                        }, 2000);
                    }
                }, 300);
                
                input.value = ''; // Clear input
            } else {
                alert(`Field ID "${fieldId}" not found in current filtered results`);
            }
        }
        
        function displayFields() {
            // Compatibility function for button clicks
            renderCurrentView();
        }
        
        function renderPagination() {
            const totalPages = Math.ceil(filteredFields.length / currentItemsPerPage);
            const pagination = document.getElementById('pagination');
            
            let html = '';
            
            // Previous button
            html += `<button onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>Previous</button>`;
            
            // Page numbers
            let startPage = Math.max(1, currentPage - 2);
            let endPage = Math.min(totalPages, currentPage + 2);
            
            if (startPage > 1) {
                html += `<button onclick="changePage(1)">1</button>`;
                if (startPage > 2) html += '<button disabled>...</button>';
            }
            
            for (let i = startPage; i <= endPage; i++) {
                html += `<button onclick="changePage(${i})" class="${i === currentPage ? 'active' : ''}">${i}</button>`;
            }
            
            if (endPage < totalPages) {
                if (endPage < totalPages - 1) html += '<button disabled>...</button>';
                html += `<button onclick="changePage(${totalPages})">${totalPages}</button>`;
            }
            
            // Next button
            html += `<button onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>Next</button>`;
            
            pagination.innerHTML = html;
        }
        
        function changePage(page) {
            const totalPages = Math.ceil(filteredFields.length / currentItemsPerPage);
            if (page < 1 || page > totalPages) return;
            
            currentPage = page;
            renderCurrentView();
        }
        
        function viewDetails(fieldId) {
            // Store field ID and return to main app
            localStorage.setItem('selectedFieldId', fieldId);
            window.close();
            window.opener?.focus();
        }
        
        function regenerateCatalog() {
            console.log('🔄 Regenerating catalog...');
            
            if (!window.opener || window.opener.closed) {
                alert('Parent window is closed. Cannot refresh data.\n\nPlease reopen the catalog from the main application.');
                return;
            }
            
            try {
                window.opener.document.dispatchEvent(
                    new CustomEvent('requestFieldsForCatalog')
                );
                
                console.log('   - Requested fresh data from parent window');
                
                setTimeout(() => {
                    console.log('   - Reloading catalog...');
                    location.reload();
                }, 200);
            } catch (error) {
                console.error('❌ Error requesting data:', error);
                alert('Error refreshing data. Please reopen the catalog.');
            }
        }
        
        function exportCatalogPDF() {
            alert('PDF export functionality coming soon!');
        }
        
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.error('Error attempting to enable fullscreen:', err);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }
        
        function switchMapMode(mode) {
            console.log(`🗺️ Map mode: ${mode}`);
            
            // Update current mode
            currentMapMode = mode;
            
            // Update button states
            document.getElementById('btnStandard').classList.remove('active');
            document.getElementById('btnSatellite').classList.remove('active');
            document.getElementById('btnHybrid').classList.remove('active');
            
            if (mode === 'standard') {
                document.getElementById('btnStandard').classList.add('active');
            } else if (mode === 'satellite') {
                document.getElementById('btnSatellite').classList.add('active');
            } else if (mode === 'hybrid') {
                document.getElementById('btnHybrid').classList.add('active');
            }
            
            // Switch all existing mini maps
            Object.keys(polygonMaps).forEach(mapId => {
                const map = polygonMaps[mapId];
                
                // Remove all existing tile layers
                map.eachLayer(layer => {
                    if (layer instanceof L.TileLayer) {
                        map.removeLayer(layer);
                    }
                });
                
                // Add new tile layer
                addTileLayer(map, mode);
                
                // CRITICAL: Force map to recalculate size and load new tiles
                // Without this, tiles don't load until user clicks zoom buttons
                setTimeout(() => {
                    map.invalidateSize();
                }, 50);
            });
            
            console.log(`✅ Switched ${Object.keys(polygonMaps).length} maps to ${mode} mode`);
        }
        
        
        // Manual flag management
        function toggleManualFlag(fieldId, flagType, isChecked) {
            console.log(`🚩 Manual flag: ${fieldId} - ${flagType} = ${isChecked}`);
            
            // Find field in allFields
            const field = allFields.find(f => f.ccsFieldId === fieldId);
            if (!field) {
                console.error(`Field not found: ${fieldId}`);
                return;
            }
            
            // Initialize manualFlags if doesn't exist
            if (!field.manualFlags) {
                field.manualFlags = {
                    selfIntersection: false,
                    straightLine: false,
                    bowTie: false,
                    otherIssue: false,
                    notes: '',
                    flaggedAt: null,
                    flaggedBy: 'user'
                };
            }
            
            // Update the specific flag
            field.manualFlags[flagType] = isChecked;
            
            // Update timestamp if any flag is checked
            const anyFlagged = field.manualFlags.selfIntersection || 
                             field.manualFlags.straightLine || 
                             field.manualFlags.bowTie || 
                             field.manualFlags.otherIssue;
            
            if (anyFlagged && !field.manualFlags.flaggedAt) {
                field.manualFlags.flaggedAt = new Date().toISOString();
            } else if (!anyFlagged) {
                field.manualFlags.flaggedAt = null;
            }
            
            // Update parent window data
            if (window.opener && !window.opener.closed) {
                try {
                    const parentField = window.opener.catalogData.find(f => f.ccsFieldId === fieldId);
                    if (parentField) {
                        parentField.manualFlags = field.manualFlags;
                        
                        // Trigger save to IndexedDB in parent
                        window.opener.document.dispatchEvent(new CustomEvent('fieldManualFlagUpdated', {
                            detail: { fieldId: fieldId, manualFlags: field.manualFlags }
                        }));
                        
                        console.log(`✅ Updated manual flags for ${fieldId} in parent window`);
                    }
                } catch (error) {
                    console.error('Error updating parent window:', error);
                }
            }
            
            // Re-render current view to show updated flag
            renderCurrentView();
        }
        
        function updateManualNotes(fieldId, notes) {
            console.log(`📝 Manual notes: ${fieldId} - "${notes}"`);
            
            // Find field in allFields
            const field = allFields.find(f => f.ccsFieldId === fieldId);
            if (!field) {
                console.error(`Field not found: ${fieldId}`);
                return;
            }
            
            // Initialize manualFlags if doesn't exist
            if (!field.manualFlags) {
                field.manualFlags = {
                    selfIntersection: false,
                    straightLine: false,
                    bowTie: false,
                    otherIssue: false,
                    notes: '',
                    flaggedAt: null,
                    flaggedBy: 'user'
                };
            }
            
            // Update notes
            field.manualFlags.notes = notes;
            
            // Update parent window data
            if (window.opener && !window.opener.closed) {
                try {
                    const parentField = window.opener.catalogData.find(f => f.ccsFieldId === fieldId);
                    if (parentField) {
                        if (!parentField.manualFlags) {
                            parentField.manualFlags = field.manualFlags;
                        } else {
                            parentField.manualFlags.notes = notes;
                        }
                        
                        // Trigger save to IndexedDB in parent
                        window.opener.document.dispatchEvent(new CustomEvent('fieldManualFlagUpdated', {
                            detail: { fieldId: fieldId, manualFlags: parentField.manualFlags }
                        }));
                        
                        console.log(`✅ Updated manual notes for ${fieldId} in parent window`);
                    }
                } catch (error) {
                    console.error('Error updating parent window:', error);
                }
            }
        }
        
        function backToCorrector() {
            if (window.opener && !window.opener.closed) {
                window.opener.focus();
            }
            window.close();
        }
        
        function hideLoading() {
            document.getElementById('loadingOverlay').style.display = 'none';
        }
    </script>
</body>
